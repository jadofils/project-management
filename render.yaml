# Render Blueprint — Project Manager
services:
  - type: web
    name: project-manager-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm run start:prod
    buildFilter:
      paths:
        - backend/**/*
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4001"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: INTER_SYSTEM_ENCRYPTION_KEY
        sync: false
      - key: BWENGE_API_URL
        sync: false
      - key: BWENGE_FRONTEND_URL
        sync: false
    autoDeploy: true
