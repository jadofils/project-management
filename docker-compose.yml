version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-project_manager}
      POSTGRES_USER: ${POSTGRES_USER:-pm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pm_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pm_user} -d ${POSTGRES_DB:-project_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NestJS API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      NODE_ENV: production
      PORT: "4001"
      DATABASE_URL: postgres://${POSTGRES_USER:-pm_user}:${POSTGRES_PASSWORD:-pm_secret}@db:5432/${POSTGRES_DB:-project_manager}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
      DB_SSL_REJECT_UNAUTHORIZED: "false"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      INTER_SYSTEM_ENCRYPTION_KEY: ${INTER_SYSTEM_ENCRYPTION_KEY:?INTER_SYSTEM_ENCRYPTION_KEY is required}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASS: ${ADMIN_PASS:-}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4000}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      BWENGE_API_URL: ${BWENGE_API_URL:-}
      BWENGE_FRONTEND_URL: ${BWENGE_FRONTEND_URL:-}
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${FRONTEND_API_URL:-http://localhost:4001/api}
    restart: unless-stopped
    ports:
      - "4000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
